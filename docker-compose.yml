version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: ai_fitness_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgre
      POSTGRES_DB: ai_fitness_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - fitness_net

  backend:
    build: ./backend
    container_name: ai_fitness_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://postgres:postgre@db:5432/ai_fitness_db?schema=public"
      GROQ_API_KEY: ${GROQ_API_KEY}
    volumes:
      - ./backend:/app             
      - /app/node_modules
    depends_on:
      - db
    networks:
      - fitness_net

  frontend:
    build: ./frontend
    container_name: ai_fitness_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - fitness_net

networks:
  fitness_net:
    driver: bridge

volumes:
  pgdata: